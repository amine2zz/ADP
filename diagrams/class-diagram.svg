<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" font-family="Inter, Segoe UI, sans-serif">
  <rect width="1100" height="750" fill="#ffffff"/>

  <!-- Title -->
  <text x="550" y="38" text-anchor="middle" font-size="18" font-weight="800" fill="#1a1a2e">Class Diagram — Nexus HCM Data Model</text>
  <line x1="200" y1="48" x2="900" y2="48" stroke="#D0271D" stroke-width="2"/>

  <!-- ── Employee ── -->
  <rect x="380" y="70" width="220" height="310" rx="6" fill="#fff" stroke="#1a1a2e" stroke-width="2"/>
  <rect x="380" y="70" width="220" height="36" rx="6" fill="#1a1a2e"/>
  <rect x="380" y="100" width="220" height="6" fill="#1a1a2e"/>
  <text x="490" y="93" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Employee</text>
  <text x="392" y="122" font-size="11" fill="#1a1a2e">- id : Long</text>
  <text x="392" y="138" font-size="11" fill="#1a1a2e">- firstName : String</text>
  <text x="392" y="154" font-size="11" fill="#1a1a2e">- lastName : String</text>
  <text x="392" y="170" font-size="11" fill="#1a1a2e">- email : String</text>
  <text x="392" y="186" font-size="11" fill="#1a1a2e">- password : String</text>
  <text x="392" y="202" font-size="11" fill="#1a1a2e">- role : String</text>
  <text x="392" y="218" font-size="11" fill="#1a1a2e">- status : String</text>
  <text x="392" y="234" font-size="11" fill="#1a1a2e">- cin : String</text>
  <text x="392" y="250" font-size="11" fill="#1a1a2e">- employeeCode : String</text>
  <text x="392" y="266" font-size="11" fill="#1a1a2e">- gender : String</text>
  <text x="392" y="282" font-size="11" fill="#1a1a2e">- phoneNumber : String</text>
  <text x="392" y="298" font-size="11" fill="#1a1a2e">- address : String</text>
  <text x="392" y="314" font-size="11" fill="#1a1a2e">- activationToken : String</text>
  <text x="392" y="330" font-size="11" fill="#1a1a2e">- createdAt : LocalDateTime</text>
  <line x1="380" y1="340" x2="600" y2="340" stroke="#1a1a2e" stroke-width="1"/>
  <text x="392" y="358" font-size="11" fill="#D0271D">+ authenticate()</text>
  <text x="392" y="374" font-size="11" fill="#D0271D">+ setupAccount()</text>

  <!-- ── Department ── -->
  <rect x="60" y="200" width="200" height="190" rx="6" fill="#fff" stroke="#1a1a2e" stroke-width="2"/>
  <rect x="60" y="200" width="200" height="36" rx="6" fill="#1a1a2e"/>
  <rect x="60" y="230" width="200" height="6" fill="#1a1a2e"/>
  <text x="160" y="223" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Department</text>
  <text x="72" y="252" font-size="11" fill="#1a1a2e">- id : Long</text>
  <text x="72" y="268" font-size="11" fill="#1a1a2e">- name : String</text>
  <text x="72" y="284" font-size="11" fill="#1a1a2e">- description : String</text>
  <text x="72" y="300" font-size="11" fill="#1a1a2e">- location : String</text>
  <text x="72" y="316" font-size="11" fill="#1a1a2e">- budgetCode : String</text>
  <text x="72" y="332" font-size="11" fill="#1a1a2e">- managerId : Long</text>
  <line x1="60" y1="342" x2="260" y2="342" stroke="#1a1a2e" stroke-width="1"/>
  <text x="72" y="360" font-size="11" fill="#D0271D">+ getEmployees()</text>
  <text x="72" y="376" font-size="11" fill="#D0271D">+ update()</text>

  <!-- ── LeaveRequest ── -->
  <rect x="700" y="70" width="210" height="220" rx="6" fill="#fff" stroke="#1a1a2e" stroke-width="2"/>
  <rect x="700" y="70" width="210" height="36" rx="6" fill="#1a1a2e"/>
  <rect x="700" y="100" width="210" height="6" fill="#1a1a2e"/>
  <text x="805" y="93" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">LeaveRequest</text>
  <text x="712" y="122" font-size="11" fill="#1a1a2e">- id : Long</text>
  <text x="712" y="138" font-size="11" fill="#1a1a2e">- type : String</text>
  <text x="712" y="154" font-size="11" fill="#1a1a2e">- startDate : LocalDate</text>
  <text x="712" y="170" font-size="11" fill="#1a1a2e">- endDate : LocalDate</text>
  <text x="712" y="186" font-size="11" fill="#1a1a2e">- reason : String</text>
  <text x="712" y="202" font-size="11" fill="#1a1a2e">- status : String</text>
  <text x="712" y="218" font-size="11" fill="#1a1a2e">- createdAt : LocalDateTime</text>
  <line x1="700" y1="228" x2="910" y2="228" stroke="#1a1a2e" stroke-width="1"/>
  <text x="712" y="246" font-size="11" fill="#D0271D">+ approve()</text>
  <text x="712" y="262" font-size="11" fill="#D0271D">+ reject()</text>
  <text x="712" y="278" font-size="11" fill="#D0271D">+ submit()</text>

  <!-- ── Attendance ── -->
  <rect x="700" y="360" width="210" height="180" rx="6" fill="#fff" stroke="#1a1a2e" stroke-width="2"/>
  <rect x="700" y="360" width="210" height="36" rx="6" fill="#1a1a2e"/>
  <rect x="700" y="390" width="210" height="6" fill="#1a1a2e"/>
  <text x="805" y="383" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Attendance</text>
  <text x="712" y="412" font-size="11" fill="#1a1a2e">- id : Long</text>
  <text x="712" y="428" font-size="11" fill="#1a1a2e">- checkIn : LocalDateTime</text>
  <text x="712" y="444" font-size="11" fill="#1a1a2e">- checkOut : LocalDateTime</text>
  <text x="712" y="460" font-size="11" fill="#1a1a2e">- status : String</text>
  <line x1="700" y1="470" x2="910" y2="470" stroke="#1a1a2e" stroke-width="1"/>
  <text x="712" y="488" font-size="11" fill="#D0271D">+ clockIn()</text>
  <text x="712" y="504" font-size="11" fill="#D0271D">+ clockOut()</text>
  <text x="712" y="520" font-size="11" fill="#D0271D">+ getDuration()</text>

  <!-- ── OperationHistory ── -->
  <rect x="60" y="500" width="210" height="190" rx="6" fill="#fff" stroke="#1a1a2e" stroke-width="2"/>
  <rect x="60" y="500" width="210" height="36" rx="6" fill="#1a1a2e"/>
  <rect x="60" y="530" width="210" height="6" fill="#1a1a2e"/>
  <text x="165" y="523" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">OperationHistory</text>
  <text x="72" y="552" font-size="11" fill="#1a1a2e">- id : Long</text>
  <text x="72" y="568" font-size="11" fill="#1a1a2e">- actor : String</text>
  <text x="72" y="584" font-size="11" fill="#1a1a2e">- operation : String</text>
  <text x="72" y="600" font-size="11" fill="#1a1a2e">- target : String</text>
  <text x="72" y="616" font-size="11" fill="#1a1a2e">- description : String</text>
  <text x="72" y="632" font-size="11" fill="#1a1a2e">- timestamp : LocalDateTime</text>
  <line x1="60" y1="642" x2="270" y2="642" stroke="#1a1a2e" stroke-width="1"/>
  <text x="72" y="660" font-size="11" fill="#D0271D">+ log()</text>

  <!-- Relationships -->
  <!-- Employee -> Department (Many-to-One) -->
  <line x1="380" y1="225" x2="260" y2="295" stroke="#D0271D" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="290" y="248" font-size="10" fill="#D0271D">N..1</text>
  <text x="268" y="268" font-size="10" fill="#64748b">belongs to</text>

  <!-- Employee -> Employee (self manager) -->
  <path d="M600 160 Q680 130 680 200 Q680 270 600 240" fill="none" stroke="#D0271D" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="685" y="195" font-size="10" fill="#D0271D">N..1</text>
  <text x="618" y="148" font-size="10" fill="#64748b">reports to</text>

  <!-- Employee -> LeaveRequest (One-to-Many) -->
  <line x1="600" y1="140" x2="700" y2="140" stroke="#D0271D" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="635" y="132" font-size="10" fill="#D0271D">1..N</text>
  <text x="620" y="155" font-size="10" fill="#64748b">submits</text>

  <!-- Employee -> Attendance (One-to-Many) -->
  <line x1="600" y1="300" x2="660" y2="420" stroke="#D0271D" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="660" y1="420" x2="700" y2="420" stroke="#D0271D" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="618" y="370" font-size="10" fill="#D0271D">1..N</text>
  <text x="620" y="385" font-size="10" fill="#64748b">logs</text>

  <!-- Employee -> OperationHistory (logged by) -->
  <line x1="490" y1="380" x2="490" y2="700" stroke="#D0271D" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="490" y1="700" x2="270" y2="700" stroke="#D0271D" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="270" y1="700" x2="270" y2="650" stroke="#D0271D" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="360" y="718" font-size="10" fill="#64748b">logged in</text>

  <!-- Legend -->
  <rect x="380" y="680" width="340" height="50" rx="6" fill="#F8F9FA" stroke="#E2E8F0" stroke-width="1"/>
  <line x1="400" y1="700" x2="440" y2="700" stroke="#D0271D" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="448" y="704" font-size="11" fill="#1a1a2e">Association (Many-to-One)</text>
  <text x="400" y="722" font-size="10" fill="#64748b">All relationships use @ManyToOne JPA annotation</text>
</svg>

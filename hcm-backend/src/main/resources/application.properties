spring.application.name=hcm-backend

# MySQL Configuration for XAMPP
spring.datasource.url=jdbc:mysql://localhost:3306/adp_hcm?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&zeroDateTimeBehavior=convertToNull
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Web Server Port
server.port=8085

# AI integration (AI HR Report Generation)
# Using Groq's OpenAI-compatible Chat Completions API (free tier).
# The key is read from the OPENAI_API_KEY environment variable and is never committed.
openai.api.key=${OPENAI_API_KEY:}
openai.api.url=https://api.groq.com/openai/v1/chat/completions
openai.api.model=llama-3.3-70b-versatile

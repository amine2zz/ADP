<div class="login-container">
  <div class="login-box">
    <div class="adp-login-header">
      <h1 class="logo-text">ADP</h1>
      <h2>Nexus HCM</h2>
    </div>
    
    <form class="login-form" (submit)="login($event)">
      <div class="form-group">
        <label for="email">Work Email</label>
        <input type="email" id="email" name="email" placeholder="example@adp.com" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn-primary login-btn">Sign In</button>
    </form>
    
    <div class="login-footer">
      <a href="#">Forgot your password?</a>
      <br><br>
      <a routerLink="/init-admin" style="font-weight: bold; color: var(--adp-red);">+ Initialize Master HR Admin</a>
    </div>
  </div>
</div>
